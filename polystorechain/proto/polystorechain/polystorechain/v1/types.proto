syntax = "proto3";
package polystorechain.polystorechain.v1;

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";

option go_package = "polystorechain/x/polystorechain/types";

// StripeReplicaProfile defines RS(K,K+M) parameters for Mode 2 (StripeReplica).
message StripeReplicaProfile {
  uint32 k = 1; // data slots
  uint32 m = 2; // parity slots
}

enum SlotStatus {
  SLOT_STATUS_UNSPECIFIED = 0;
  SLOT_STATUS_ACTIVE = 1;
  SLOT_STATUS_REPAIRING = 2;
}

// EvidenceClass describes the strongest evidence quality currently attached to
// a policing case. It is intentionally coarser than a reason code so policy can
// set consequence ceilings before economics are enabled.
enum EvidenceClass {
  // EVIDENCE_CLASS_UNSPECIFIED is the default unset value.
  EVIDENCE_CLASS_UNSPECIFIED = 0;
  // EVIDENCE_CLASS_CRYPTOGRAPHIC_HARD is deterministic proof or fraud evidence.
  EVIDENCE_CLASS_CRYPTOGRAPHIC_HARD = 1;
  // EVIDENCE_CLASS_CHAIN_MEASURABLE_SOFT is chain-observed liveness evidence.
  EVIDENCE_CLASS_CHAIN_MEASURABLE_SOFT = 2;
  // EVIDENCE_CLASS_THRESHOLD is repeated evidence that crossed conviction policy.
  EVIDENCE_CLASS_THRESHOLD = 3;
  // EVIDENCE_CLASS_CLIENT_OBSERVED is non-consensus client or gateway evidence.
  EVIDENCE_CLASS_CLIENT_OBSERVED = 4;
  // EVIDENCE_CLASS_STATISTICAL is aggregate behavior evidence.
  EVIDENCE_CLASS_STATISTICAL = 5;
  // EVIDENCE_CLASS_OPERATIONAL is maintenance or coordination evidence.
  EVIDENCE_CLASS_OPERATIONAL = 6;
  // EVIDENCE_CLASS_POSITIVE_READINESS is repair/readiness progress evidence.
  EVIDENCE_CLASS_POSITIVE_READINESS = 7;
}

// EvidenceSeverity is the live policy interpretation of an evidence case.
enum EvidenceSeverity {
  // EVIDENCE_SEVERITY_UNSPECIFIED is the default unset value.
  EVIDENCE_SEVERITY_UNSPECIFIED = 0;
  // EVIDENCE_SEVERITY_INFO is informational and non-punitive.
  EVIDENCE_SEVERITY_INFO = 1;
  // EVIDENCE_SEVERITY_SOFT is weak or early evidence.
  EVIDENCE_SEVERITY_SOFT = 2;
  // EVIDENCE_SEVERITY_DEGRADED means health decay or operator alert.
  EVIDENCE_SEVERITY_DEGRADED = 3;
  // EVIDENCE_SEVERITY_DELINQUENT means threshold-crossed soft evidence.
  EVIDENCE_SEVERITY_DELINQUENT = 4;
  // EVIDENCE_SEVERITY_HARD means slash or jail candidate evidence.
  EVIDENCE_SEVERITY_HARD = 5;
  // EVIDENCE_SEVERITY_REPAIR means repair coordination evidence.
  EVIDENCE_SEVERITY_REPAIR = 6;
}

// EvidenceCaseStatus tracks whether an evidence case is only observed,
// threshold-convicted, or resolved by repair/readiness.
enum EvidenceCaseStatus {
  // EVIDENCE_CASE_STATUS_UNSPECIFIED is the default unset value.
  EVIDENCE_CASE_STATUS_UNSPECIFIED = 0;
  // EVIDENCE_CASE_STATUS_OBSERVED means evidence has not crossed conviction.
  EVIDENCE_CASE_STATUS_OBSERVED = 1;
  // EVIDENCE_CASE_STATUS_CONVICTED means threshold policy accepted the case.
  EVIDENCE_CASE_STATUS_CONVICTED = 2;
  // EVIDENCE_CASE_STATUS_RESOLVED means repair or readiness closed the case.
  EVIDENCE_CASE_STATUS_RESOLVED = 3;
}

// SlotHealthStatus is the derived per-slot lifecycle used for operator and UI
// visibility. DealSlot.status remains the canonical placement status.
enum SlotHealthStatus {
  // SLOT_HEALTH_STATUS_UNSPECIFIED is the default unset value.
  SLOT_HEALTH_STATUS_UNSPECIFIED = 0;
  // SLOT_HEALTH_STATUS_HEALTHY means no current health issue is recorded.
  SLOT_HEALTH_STATUS_HEALTHY = 1;
  // SLOT_HEALTH_STATUS_SUSPECT means soft evidence is below repair threshold.
  SLOT_HEALTH_STATUS_SUSPECT = 2;
  // SLOT_HEALTH_STATUS_DELINQUENT means soft evidence crossed threshold.
  SLOT_HEALTH_STATUS_DELINQUENT = 3;
  // SLOT_HEALTH_STATUS_REPAIRING means a pending provider is catching up.
  SLOT_HEALTH_STATUS_REPAIRING = 4;
  // SLOT_HEALTH_STATUS_CATCHUP_READY means the pending provider proved readiness.
  SLOT_HEALTH_STATUS_CATCHUP_READY = 5;
  // SLOT_HEALTH_STATUS_ACTIVE_PROMOTED means repair promotion just completed.
  SLOT_HEALTH_STATUS_ACTIVE_PROMOTED = 6;
  // SLOT_HEALTH_STATUS_REPAIR_BACKOFF means repair could not start safely.
  SLOT_HEALTH_STATUS_REPAIR_BACKOFF = 7;
  // SLOT_HEALTH_STATUS_EXPIRED means the slot is no longer active.
  SLOT_HEALTH_STATUS_EXPIRED = 8;
}

// ProviderLifecycleStatus is the provider-centric health/lifecycle view used
// for operator status and future placement/economics gates. It is observational
// until explicit enforcement parameters are enabled.
enum ProviderLifecycleStatus {
  // PROVIDER_LIFECYCLE_STATUS_UNSPECIFIED is the default unset value.
  PROVIDER_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  // PROVIDER_LIFECYCLE_STATUS_PAIRED means identity pairing exists.
  PROVIDER_LIFECYCLE_STATUS_PAIRED = 1;
  // PROVIDER_LIFECYCLE_STATUS_PROBATIONARY means limited assignment eligible.
  PROVIDER_LIFECYCLE_STATUS_PROBATIONARY = 2;
  // PROVIDER_LIFECYCLE_STATUS_ACTIVE means normal assignment eligible.
  PROVIDER_LIFECYCLE_STATUS_ACTIVE = 3;
  // PROVIDER_LIFECYCLE_STATUS_PREFERRED means sustained good performance.
  PROVIDER_LIFECYCLE_STATUS_PREFERRED = 4;
  // PROVIDER_LIFECYCLE_STATUS_HIGH_BANDWIDTH means hot-path eligible.
  PROVIDER_LIFECYCLE_STATUS_HIGH_BANDWIDTH = 5;
  // PROVIDER_LIFECYCLE_STATUS_DEGRADED means soft evidence requires attention.
  PROVIDER_LIFECYCLE_STATUS_DEGRADED = 6;
  // PROVIDER_LIFECYCLE_STATUS_DELINQUENT means threshold evidence crossed.
  PROVIDER_LIFECYCLE_STATUS_DELINQUENT = 7;
  // PROVIDER_LIFECYCLE_STATUS_DRAINING means voluntary exit is in progress.
  PROVIDER_LIFECYCLE_STATUS_DRAINING = 8;
  // PROVIDER_LIFECYCLE_STATUS_JAILED means provider is explicitly ineligible.
  PROVIDER_LIFECYCLE_STATUS_JAILED = 9;
  // PROVIDER_LIFECYCLE_STATUS_EXITED means provider is no longer active.
  PROVIDER_LIFECYCLE_STATUS_EXITED = 10;
}

// EvidenceCase is the structured policing ledger for failures, repair
// milestones, and hard-fault records. The legacy Proof summary remains for
// compatibility, while this object carries machine-readable attribution.
message EvidenceCase {
  uint64 id = 1;
  bytes evidence_id = 2; // deterministic 32-byte case hash when available
  uint64 deal_id = 3;
  uint32 slot = 4;
  string provider = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string reporter = 6;
  string reason = 7;
  EvidenceClass evidence_class = 8;
  EvidenceSeverity severity = 9;
  EvidenceCaseStatus status = 10;
  bool slashable = 11;
  bool counts_as_failure = 12;
  uint64 epoch_id = 13;
  uint64 count = 14;
  int64 first_height = 15;
  int64 last_height = 16;
  bytes session_id = 17;
  string summary = 18;
  string consequence_ceiling = 19;
}

// SlotHealthState is the latest explainable health state for a Mode 2 slot.
message SlotHealthState {
  uint64 deal_id = 1;
  uint32 slot = 2;
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  SlotHealthStatus status = 4;
  string reason = 5;
  EvidenceClass evidence_class = 6;
  EvidenceSeverity severity = 7;
  uint64 missed_epochs = 8;
  uint64 deputy_missed_epochs = 9;
  uint64 last_epoch_id = 10;
  int64 updated_height = 11;
  uint64 last_evidence_case_id = 12;
  string pending_provider = 13 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 repair_target_gen = 14;
}

// ProviderHealthState is the latest provider-centric lifecycle summary derived
// from structured evidence and provider registration state. It is intentionally
// non-punitive until explicit enforcement params consume it.
message ProviderHealthState {
  string provider = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  ProviderLifecycleStatus lifecycle_status = 2;
  string reason = 3;
  EvidenceClass evidence_class = 4;
  EvidenceSeverity severity = 5;
  uint64 last_evidence_case_id = 6;
  uint64 last_deal_id = 7;
  uint32 last_slot = 8;
  uint64 last_epoch_id = 9;
  int64 updated_height = 10;
  uint64 soft_fault_count = 11;
  uint64 hard_fault_count = 12;
  uint64 repair_event_count = 13;
  string consequence_ceiling = 14;
}

// RepairAttemptState is the explicit per-slot repair coordination ledger. It
// turns previously implicit repair/backoff evidence into queryable protocol
// state for replacement-grinding controls, operator status, and future
// calibrated jail/slash policy.
message RepairAttemptState {
  uint64 deal_id = 1;
  uint32 slot = 2;
  uint64 attempt_count = 3;
  uint64 backoff_count = 4;
  uint64 candidate_exhaustion_count = 5;
  uint64 cooldown_until_epoch = 6;
  uint64 last_attempt_epoch = 7;
  int64 last_attempt_height = 8;
  string provider = 9 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string pending_provider = 10 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string last_reason = 11;
  uint64 repair_target_gen = 12;
  uint64 last_evidence_case_id = 13;
}

// RetrievalPolicyMode controls who may open USER-funded retrieval sessions
// for a deal (i.e. sponsored sessions). Protocol sessions (audit/repair) are
// authorized separately and bypass this policy.
enum RetrievalPolicyMode {
  RETRIEVAL_POLICY_MODE_UNSPECIFIED = 0;
  RETRIEVAL_POLICY_MODE_OWNER_ONLY = 1;
  RETRIEVAL_POLICY_MODE_ALLOWLIST = 2;
  RETRIEVAL_POLICY_MODE_VOUCHER = 3;
  RETRIEVAL_POLICY_MODE_ALLOWLIST_OR_VOUCHER = 4;
  RETRIEVAL_POLICY_MODE_PUBLIC = 5;
}

// RetrievalPolicy is the on-chain retrieval authorization policy for a deal.
message RetrievalPolicy {
  RetrievalPolicyMode mode = 1;
  bytes allowlist_root = 2; // 32-byte keccak merkle root (optional; used for allowlist modes)
  string voucher_signer = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // optional; defaults to Deal.owner
}

// DealSlot is the canonical slot -> provider mapping for a Mode 2 deal.
message DealSlot {
  uint32 slot = 1; // 0..N-1
  string provider = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  SlotStatus status = 3;

  // Make-before-break replacement candidate (optional).
  string pending_provider = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  int64 status_since_height = 5;
  uint64 repair_target_gen = 6;
}

// Deal represents a storage deal between a user and the network.
message Deal {
  uint64 id = 1;
  bytes manifest_root = 2; // 48-byte KZG commitment to the Manifest MDU
  uint64 size = 3; // Actual size of current content in bytes (Mutable)
  string owner = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // Address of the deal creator
  string escrow_balance = 5 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // Remaining $STOR for payments
  uint64 start_block = 6; // Block height when deal became active
  uint64 end_block = 7; // Block height when deal expires
  repeated string providers = 8 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // List of assigned SP addresses (Base Layer)
  uint32 redundancy_mode = 9; // e.g., 1 = FullReplica (Mode 1), 2 = StripeReplica (Mode 2: RS(K,K+M), default K=8,M=4)
  uint64 current_replication = 10; // e.g., 12 for base layer, increases with hot replicas
  string service_hint = 11; // "Hot" or "Cold"
  string max_monthly_spend = 12 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // User's monthly spend cap for elasticity
  // Field 13 reserved for removed capacity tiers.
  uint64 total_mdus = 14; // Total number of MDUs in the deal
  uint64 spend_window_start_height = 15; // Start height for monthly elasticity spend window
  string spend_window_spent = 16 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // Elasticity spend in current window (bond denom units)

  // --- Mode 2 explicit encoding (canonical state) ---
  StripeReplicaProfile mode2_profile = 17; // set iff redundancy_mode == 2
  repeated DealSlot mode2_slots = 18; // length N, slot-ordered

  // --- Generation / write coordination ---
  uint64 current_gen = 19; // increments on manifest_root changes

  // --- Slab accounting (bounds + policy) ---
  uint64 witness_mdus = 20; // number of witness MDUs committed after MDU #0

  // pricing_anchor_block is used for renewal-safe lock-in pricing on newly added bytes.
  // See `rfcs/rfc-deal-expiry-and-extension.md`.
  uint64 pricing_anchor_block = 21;

  // retrieval_policy governs sponsored USER retrieval session opens.
  RetrievalPolicy retrieval_policy = 22 [(gogoproto.nullable) = false];
}

// DealActivityState tracks aggregate retrieval and liveness activity counters for a deal.
// It records bytes served, completed retrievals, failed challenges, and the last update height.
message DealActivityState {
  uint64 bytes_served_total = 1;
  uint64 failed_challenges_total = 2;
  int64 last_update_height = 3;
  uint64 successful_retrievals_total = 4;
}

// Provider represents a Storage Provider in the network.
message Provider {
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 total_storage = 2; // Total storage capacity in bytes
  uint64 used_storage = 3; // Used storage capacity in bytes
  string capabilities = 4; // "Archive", "General", "Edge"
  string status = 5; // "Active", "Offline", "Jailed"
  int64 reputation_score = 6; // Uptime/Performance score
  repeated string endpoints = 7; // Provider transport endpoints as Multiaddrs (HTTP now; libp2p future)
  bool draining = 8; // If true, provider will not receive new assignments (see RFC provider exit/draining).
  cosmos.base.v1beta1.Coin bond = 9 [(gogoproto.nullable) = false]; // Active self-bond locked in the provider-bond module account.
  cosmos.base.v1beta1.Coin bond_slashed = 10 [(gogoproto.nullable) = false]; // Cumulative self-bond burned for hard faults.
}

message ProviderPairing {
  string provider = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  reserved 3;
  int64 paired_height = 4;
}

message PendingProviderLink {
  string provider = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  int64 requested_height = 3;
}

// VirtualStripe tracks overlay replicas for a deal, used for elasticity.
message VirtualStripe {
  uint64 deal_id = 1;
  uint32 stripe_index = 2; // Which stripe this refers to (e.g., shard index)
  repeated string overlay_providers = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // List of providers holding this overlay replica
}

// ChainedProof implements the "Triple Proof" architecture for 3-hop verification.
message ChainedProof {
  // Hop 1: Identity (Deal -> MDU)
  uint64 mdu_index = 1;
  bytes mdu_root_fr = 2; // Scalar representation of MDU Merkle Root
  bytes manifest_opening = 3; // KZG proof for Manifest -> MDU Root

  // Hop 2: Structure (MDU -> Blob)
  bytes blob_commitment = 4; // 48-byte KZG commitment of the blob
  repeated bytes merkle_path = 5; // Path from Blob to MDU Root
  uint32 blob_index = 6; // Index of blob in MDU

  // Hop 3: Data (Blob -> Byte)
  bytes z_value = 7;
  bytes y_value = 8;
  bytes kzg_opening_proof = 9;
}

// RetrievalSessionStatus is the on-chain lifecycle state for a retrieval session.
enum RetrievalSessionStatus {
  RETRIEVAL_SESSION_STATUS_UNSPECIFIED = 0;
  RETRIEVAL_SESSION_STATUS_OPEN = 1;
  RETRIEVAL_SESSION_STATUS_PROOF_SUBMITTED = 2;
  RETRIEVAL_SESSION_STATUS_USER_CONFIRMED = 3;
  RETRIEVAL_SESSION_STATUS_COMPLETED = 4;
  RETRIEVAL_SESSION_STATUS_EXPIRED = 5;
  RETRIEVAL_SESSION_STATUS_CANCELED = 6;
}

// RetrievalSessionPurpose describes why the session exists.
enum RetrievalSessionPurpose {
  RETRIEVAL_SESSION_PURPOSE_UNSPECIFIED = 0;
  RETRIEVAL_SESSION_PURPOSE_USER = 1;
  RETRIEVAL_SESSION_PURPOSE_PROTOCOL_AUDIT = 2;
  RETRIEVAL_SESSION_PURPOSE_PROTOCOL_REPAIR = 3;
}

// RetrievalSessionFunding describes which balance funds the session fees.
enum RetrievalSessionFunding {
  RETRIEVAL_SESSION_FUNDING_UNSPECIFIED = 0;
  RETRIEVAL_SESSION_FUNDING_DEAL_ESCROW = 1;
  RETRIEVAL_SESSION_FUNDING_REQUESTER = 2;
  RETRIEVAL_SESSION_FUNDING_PROTOCOL = 3;
}

// RetrievalSession is an on-chain authorization + completion object for a blob-range retrieval.
// It is provider-bound, deal-bound, and pins the current Deal.manifest_root to avoid ambiguity.
message RetrievalSession {
  bytes session_id = 1; // 32-byte keccak256 hash of canonical session fields
  uint64 deal_id = 2;
  // owner is the account that opened the session (also the session nonce scope).
  // For owner-paid sessions this equals the Deal.owner; for sponsored sessions it
  // equals the requester.
  string owner = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string provider = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes manifest_root = 5; // 48-byte KZG commitment pinned at session open

  uint64 start_mdu_index = 6;
  uint32 start_blob_index = 7;
  uint64 blob_count = 8;
  uint64 total_bytes = 9; // blob_count * 131072

  uint64 nonce = 10; // strictly increasing per (owner, deal_id, provider)
  uint64 expires_at = 11; // block height (0 = no expiry)

  int64 opened_height = 12;
  int64 updated_height = 13;
  RetrievalSessionStatus status = 14;

  string locked_fee = 15 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // Locked variable fee (excludes base fee)

  RetrievalSessionPurpose purpose = 16;
  RetrievalSessionFunding funding = 17;
  // payer is used for refund routing for non-escrow funded sessions.
  // It MAY be empty for DEAL_ESCROW sessions.
  string payer = 18 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// AuditTask is a deterministic protocol-assigned retrieval task used for audit sessions.
// It is keyed by (epoch_id, task_id) in state and is used to authorize protocol audit retrieval sessions.
message AuditTask {
  uint64 epoch_id = 1;
  uint64 task_id = 2;
  uint64 deal_id = 3;
  string assignee = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string provider = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // serving provider
  bytes manifest_root = 6; // pinned 48-byte KZG commitment
  uint64 start_mdu_index = 7;
  uint32 start_blob_index = 8;
  uint64 blob_count = 9;
  uint64 expires_at = 10; // block height (0 = default to deal end_block)
}

// RetrievalReceipt represents a user's signed confirmation of data retrieval.
message RetrievalReceipt {
  uint64 deal_id = 1;
  uint64 epoch_id = 2;
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // Provider's address
  uint64 bytes_served = 4;  // Actual bytes transferred (for one shard chunk)
  ChainedProof proof_details = 5 [(gogoproto.nullable) = false]; // Chained proof for the served chunk
  bytes user_signature = 6; // User's signature over the retrieval fields
  uint64 nonce = 7;         // Strictly increasing per (deal_id, file_path) to prevent replay
  uint64 expires_at = 8;    // Optional block height/timestamp after which this receipt is invalid (0 = no expiry)
  string file_path = 9;     // PolyFS file path (opaque to chain; used for nonce scoping and audits)
  uint64 range_start = 10;  // Byte range start within file (for auditability/accounting)
  uint64 range_len = 11;    // Byte range length within file (MUST equal bytes_served)
}

// RetrievalReceiptBatch allows a provider to submit multiple receipts in one tx.
message RetrievalReceiptBatch {
  repeated RetrievalReceipt receipts = 1 [(gogoproto.nullable) = false];
}

// DownloadSessionReceipt is a session-level user signature authorizing a set of chunk proofs.
// The session commits to a Merkle root over per-chunk leaf hashes derived from (range_start, range_len, proof_hash).
message DownloadSessionReceipt {
  uint64 deal_id = 1;
  uint64 epoch_id = 2;
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string file_path = 4;
  uint64 total_bytes = 5;
  uint64 chunk_count = 6;
  bytes chunk_leaf_root = 7; // 32-byte Merkle root over chunk leaf hashes
  bytes user_signature = 8;  // 65-byte EIP-712 signature (R||S||V)
  uint64 nonce = 9;          // Strictly increasing per (deal_id, file_path)
  uint64 expires_at = 10;    // Optional expiry (0 = no expiry)
}

// SessionChunkProof is a single proved chunk within a DownloadSessionReceipt.
message SessionChunkProof {
  uint64 range_start = 1;
  uint64 range_len = 2;
  ChainedProof proof_details = 3 [(gogoproto.nullable) = false];
  uint32 leaf_index = 4;          // Index of leaf in the session Merkle tree
  repeated bytes merkle_path = 5; // Merkle path siblings (32-byte nodes)
}

// RetrievalSessionProof bundles a session receipt with the per-chunk proofs it commits to.
message RetrievalSessionProof {
  DownloadSessionReceipt session_receipt = 1 [(gogoproto.nullable) = false];
  repeated SessionChunkProof chunks = 2 [(gogoproto.nullable) = false];
}
