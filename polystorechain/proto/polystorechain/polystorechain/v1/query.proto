syntax = "proto3";
package polystorechain.polystorechain.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "polystorechain/polystorechain/v1/params.proto";
import "polystorechain/polystorechain/v1/proof.proto";
import "polystorechain/polystorechain/v1/types.proto"; // ADDED

option go_package = "polystorechain/x/polystorechain/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/params";
  }

  // Queries a list of Proof items.
  rpc ListProofs(QueryListProofsRequest) returns (QueryListProofsResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/proofs";
  }

  // Queries a list of Deal items.
  rpc ListDeals(QueryListDealsRequest) returns (QueryListDealsResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals";
  }

  // Queries a Deal by id.
  rpc GetDeal(QueryGetDealRequest) returns (QueryGetDealResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{id}";
  }

  // Queries a list of Provider items.
  rpc ListProviders(QueryListProvidersRequest) returns (QueryListProvidersResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/providers";
  }

  // Queries a Provider by address.
  rpc GetProvider(QueryGetProviderRequest) returns (QueryGetProviderResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/providers/{address}";
  }

  // Queries the provider-centric health and lifecycle summary.
  rpc GetProviderHealth(QueryGetProviderHealthRequest) returns (QueryGetProviderHealthResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/providers/{address}/health";
  }

  // Lists provider-centric health and lifecycle summaries.
  rpc ListProviderHealth(QueryListProviderHealthRequest) returns (QueryListProviderHealthResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/provider-health";
  }

  // Queries the operator pairing for a provider address.
  rpc GetProviderPairing(QueryGetProviderPairingRequest) returns (QueryGetProviderPairingResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/provider-pairings/{provider}";
  }

  // Lists paired providers for an operator address.
  rpc ListProvidersByOperator(QueryListProvidersByOperatorRequest) returns (QueryListProvidersByOperatorResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/provider-pairings/by-operator/{operator}";
  }

  // Queries a pending provider link by provider address.
  rpc GetPendingProviderLink(QueryGetPendingProviderLinkRequest) returns (QueryGetPendingProviderLinkResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/provider-pairings/pending/{provider}";
  }

  // Lists pending provider links for an operator address.
  rpc ListPendingProviderLinksByOperator(QueryListPendingProviderLinksByOperatorRequest) returns (QueryListPendingProviderLinksByOperatorResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/provider-pairings/pending-by-operator/{operator}";
  }

  // Queries activity counters for a deal.
  rpc GetDealActivity(QueryGetDealActivityRequest) returns (QueryGetDealActivityResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/activity";
  }

  // Queries the last accepted retrieval receipt nonce for a specific (deal_id, file_path).
  rpc GetReceiptNonce(QueryGetReceiptNonceRequest) returns (QueryGetReceiptNonceResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/receipt-nonce";
  }

  // Queries a RetrievalSession by id.
  rpc GetRetrievalSession(QueryGetRetrievalSessionRequest) returns (QueryGetRetrievalSessionResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/retrieval-sessions/{session_id}";
  }

  // Lists RetrievalSessions for an owner.
  rpc ListRetrievalSessionsByOwner(QueryListRetrievalSessionsByOwnerRequest) returns (QueryListRetrievalSessionsByOwnerResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/retrieval-sessions/by-owner/{owner}";
  }

  // Lists RetrievalSessions for a provider.
  rpc ListRetrievalSessionsByProvider(QueryListRetrievalSessionsByProviderRequest) returns (QueryListRetrievalSessionsByProviderResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/retrieval-sessions/by-provider/{provider}";
  }

  // Queries a virtual overlay stripe for a deal.
  rpc GetVirtualStripe(QueryGetVirtualStripeRequest) returns (QueryGetVirtualStripeResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/virtual-stripes/{stripe_index}";
  }

  // Lists virtual overlay stripes for a deal.
  rpc ListVirtualStripesByDeal(QueryListVirtualStripesByDealRequest) returns (QueryListVirtualStripesByDealResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/virtual-stripes";
  }

  // Queries the latest structured health state for a Mode 2 slot.
  rpc GetSlotHealth(QueryGetSlotHealthRequest) returns (QueryGetSlotHealthResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/slots/{slot}/health";
  }

  // Lists structured slot health states for a deal.
  rpc ListSlotHealthByDeal(QueryListSlotHealthByDealRequest) returns (QueryListSlotHealthByDealResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/deals/{deal_id}/slot-health";
  }

  // Lists structured evidence cases, optionally filtered by deal.
  rpc ListEvidenceCases(QueryListEvidenceCasesRequest) returns (QueryListEvidenceCasesResponse) {
    option (google.api.http).get = "/polystorechain/polystorechain/v1/evidence";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryListProofsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryListProofsResponse {
  repeated Proof proof = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryListDealsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryListDealsResponse {
  repeated Deal deals = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetDealRequest {
  uint64 id = 1;
}

message QueryGetDealResponse {
  Deal deal = 1;
}

message QueryListProvidersRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryListProvidersResponse {
  repeated Provider providers = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetProviderRequest {
  string address = 1;
}

message QueryGetProviderResponse {
  Provider provider = 1;
}

// QueryGetProviderHealthRequest requests provider health by address.
message QueryGetProviderHealthRequest {
  string address = 1;
}

// QueryGetProviderHealthResponse returns provider-centric health state.
message QueryGetProviderHealthResponse {
  ProviderHealthState health = 1 [(gogoproto.nullable) = false];
}

// QueryListProviderHealthRequest lists provider health summaries.
message QueryListProviderHealthRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryListProviderHealthResponse returns provider health summaries.
message QueryListProviderHealthResponse {
  repeated ProviderHealthState health = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetProviderPairingRequest {
  string provider = 1;
}

message QueryGetProviderPairingResponse {
  ProviderPairing pairing = 1 [(gogoproto.nullable) = false];
}

message QueryListProvidersByOperatorRequest {
  string operator = 1;
}

message QueryListProvidersByOperatorResponse {
  repeated ProviderPairing pairings = 1 [(gogoproto.nullable) = false];
}

message QueryGetPendingProviderLinkRequest {
  string provider = 1;
}

message QueryGetPendingProviderLinkResponse {
  PendingProviderLink link = 1 [(gogoproto.nullable) = false];
}

message QueryListPendingProviderLinksByOperatorRequest {
  string operator = 1;
}

message QueryListPendingProviderLinksByOperatorResponse {
  repeated PendingProviderLink links = 1 [(gogoproto.nullable) = false];
}

message QueryGetDealActivityRequest {
  uint64 deal_id = 1;
}

message QueryGetDealActivityResponse {
  DealActivityState activity = 1 [(gogoproto.nullable) = false];
}

message QueryGetReceiptNonceRequest {
  uint64 deal_id = 1;
  string file_path = 2;
}

message QueryGetReceiptNonceResponse {
  uint64 last_nonce = 1;
}

message QueryGetRetrievalSessionRequest {
  bytes session_id = 1;
}

message QueryGetRetrievalSessionResponse {
  RetrievalSession session = 1 [(gogoproto.nullable) = false];
}

message QueryListRetrievalSessionsByOwnerRequest {
  string owner = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryListRetrievalSessionsByOwnerResponse {
  repeated RetrievalSession sessions = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryListRetrievalSessionsByProviderRequest {
  string provider = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryListRetrievalSessionsByProviderResponse {
  repeated RetrievalSession sessions = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetVirtualStripeRequest {
  uint64 deal_id = 1;
  uint32 stripe_index = 2;
}

message QueryGetVirtualStripeResponse {
  VirtualStripe stripe = 1 [(gogoproto.nullable) = false];
}

message QueryListVirtualStripesByDealRequest {
  uint64 deal_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryListVirtualStripesByDealResponse {
  repeated VirtualStripe stripes = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryGetSlotHealthRequest requests the latest health state for a slot.
message QueryGetSlotHealthRequest {
  uint64 deal_id = 1;
  uint32 slot = 2;
}

// QueryGetSlotHealthResponse returns the latest health state for a slot.
message QueryGetSlotHealthResponse {
  SlotHealthState health = 1 [(gogoproto.nullable) = false];
}

// QueryListSlotHealthByDealRequest requests all slot health states for a deal.
message QueryListSlotHealthByDealRequest {
  uint64 deal_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryListSlotHealthByDealResponse returns all slot health states for a deal.
message QueryListSlotHealthByDealResponse {
  repeated SlotHealthState health = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryListEvidenceCasesRequest lists structured evidence cases.
message QueryListEvidenceCasesRequest {
  uint64 deal_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryListEvidenceCasesResponse returns structured evidence cases.
message QueryListEvidenceCasesResponse {
  repeated EvidenceCase evidence = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
