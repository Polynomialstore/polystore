syntax = "proto3";
package polystorechain.polystorechain.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "polystorechain/polystorechain/v1/params.proto";
import "polystorechain/polystorechain/v1/types.proto"; // NEW: Import types.proto

option go_package = "polystorechain/x/polystorechain/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // MsgRegisterProvider allows a Storage Provider to register themselves with the network.
  rpc RegisterProvider(MsgRegisterProvider) returns (MsgRegisterProviderResponse);

  // MsgSetProviderDraining allows a provider to opt out of new assignments.
  rpc SetProviderDraining(MsgSetProviderDraining) returns (MsgSetProviderDrainingResponse);

  // MsgUpdateProviderEndpoints allows a provider to update its registered endpoints.
  rpc UpdateProviderEndpoints(MsgUpdateProviderEndpoints) returns (MsgUpdateProviderEndpointsResponse);

  // MsgRequestProviderLink allows a provider key to request linking to an operator wallet.
  rpc RequestProviderLink(MsgRequestProviderLink) returns (MsgRequestProviderLinkResponse);

  // MsgApproveProviderLink allows an operator wallet to approve a pending provider link request.
  rpc ApproveProviderLink(MsgApproveProviderLink) returns (MsgApproveProviderLinkResponse);

  // MsgCancelProviderLink allows a provider key to cancel its pending provider link request.
  rpc CancelProviderLink(MsgCancelProviderLink) returns (MsgCancelProviderLinkResponse);

  // MsgUnpairProvider removes an existing provider<->operator link.
  rpc UnpairProvider(MsgUnpairProvider) returns (MsgUnpairProviderResponse);

  // MsgCreateDeal allows a user to create a new storage deal.
  rpc CreateDeal(MsgCreateDeal) returns (MsgCreateDealResponse);

  // MsgUpdateDealContent allows a user to commit or update the content (manifest) of a deal.
  rpc UpdateDealContent(MsgUpdateDealContent) returns (MsgUpdateDealContentResponse);

  // MsgBumpDealSetupSlot allows a deal owner to replace a single Mode 2 slot
  // during setup, before the first content commit.
  rpc BumpDealSetupSlot(MsgBumpDealSetupSlot) returns (MsgBumpDealSetupSlotResponse);

  // MsgCreateDealFromEvm allows a user to create a new storage deal
  // using an EVM-signed intent bridged into polystorechaind.
  rpc CreateDealFromEvm(MsgCreateDealFromEvm) returns (MsgCreateDealFromEvmResponse);

  // MsgUpdateDealContentFromEvm allows a user to update deal content
  // using an EVM-signed intent.
  rpc UpdateDealContentFromEvm(MsgUpdateDealContentFromEvm) returns (MsgUpdateDealContentFromEvmResponse);

  // MsgOpenRetrievalSession opens an on-chain retrieval session for a contiguous blob-range.
  rpc OpenRetrievalSession(MsgOpenRetrievalSession) returns (MsgOpenRetrievalSessionResponse);

  // MsgOpenRetrievalSessionSponsored opens a USER retrieval session funded by the requester
  // (not by the deal escrow). This is used for public/allowlisted/voucher retrievals.
  rpc OpenRetrievalSessionSponsored(MsgOpenRetrievalSessionSponsored) returns (MsgOpenRetrievalSessionSponsoredResponse);

  // MsgOpenProtocolRetrievalSession opens a protocol-funded retrieval session for audit/repair.
  rpc OpenProtocolRetrievalSession(MsgOpenProtocolRetrievalSession) returns (MsgOpenProtocolRetrievalSessionResponse);

  // MsgConfirmRetrievalSession confirms completion of a retrieval session (proof-of-validation).
  rpc ConfirmRetrievalSession(MsgConfirmRetrievalSession) returns (MsgConfirmRetrievalSessionResponse);

  // MsgCancelRetrievalSession cancels an expired retrieval session and unlocks fees.
  rpc CancelRetrievalSession(MsgCancelRetrievalSession) returns (MsgCancelRetrievalSessionResponse);

  // MsgSubmitRetrievalSessionProof submits proof-of-retrieval for a session (provider action).
  rpc SubmitRetrievalSessionProof(MsgSubmitRetrievalSessionProof) returns (MsgSubmitRetrievalSessionProofResponse);

  // MsgProveLiveness allows a Storage Provider to submit a proof of data liveness.
  rpc ProveLiveness(MsgProveLiveness) returns (MsgProveLivenessResponse);

  // MsgSignalSaturation allows a Storage Provider to signal high load for a deal.
  rpc SignalSaturation(MsgSignalSaturation) returns (MsgSignalSaturationResponse);

  // MsgStartSlotRepair marks a Mode 2 slot as repairing and sets a replacement candidate.
  rpc StartSlotRepair(MsgStartSlotRepair) returns (MsgStartSlotRepairResponse);

  // MsgCompleteSlotRepair promotes the pending replacement candidate to active.
  rpc CompleteSlotRepair(MsgCompleteSlotRepair) returns (MsgCompleteSlotRepairResponse);

  // MsgAddCredit allows a user to top up the escrow balance for a deal.
  rpc AddCredit(MsgAddCredit) returns (MsgAddCreditResponse);

  // MsgExtendDeal extends a deal term by paying spot storage price for existing bytes.
  rpc ExtendDeal(MsgExtendDeal) returns (MsgExtendDealResponse);

  // MsgUpdateDealRetrievalPolicy updates the on-chain retrieval policy for a deal.
  rpc UpdateDealRetrievalPolicy(MsgUpdateDealRetrievalPolicy) returns (MsgUpdateDealRetrievalPolicyResponse);

  // MsgWithdrawRewards allows a Storage Provider to withdraw accumulated rewards.
  rpc WithdrawRewards(MsgWithdrawRewards) returns (MsgWithdrawRewardsResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegisterProvider allows a Storage Provider to register themselves with the network.
message MsgRegisterProvider {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgRegisterProvider";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string capabilities = 2; // "Archive", "General", "Edge"
  uint64 total_storage = 3; // Total storage capacity in bytes
  repeated string endpoints = 4; // Provider endpoints as Multiaddr strings (HTTP first)
}

// MsgRegisterProviderResponse defines the response structure for registering a provider.
message MsgRegisterProviderResponse {
  bool success = 1;
}

// MsgSetProviderDraining sets a provider's draining flag (no new assignments when draining=true).
message MsgSetProviderDraining {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgSetProviderDraining";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bool draining = 2;
}

message MsgSetProviderDrainingResponse {
  bool success = 1;
}

message MsgUpdateProviderEndpoints {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUpdateProviderEndpoints";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated string endpoints = 2; // Provider endpoints as Multiaddr strings (HTTP first)
}

message MsgUpdateProviderEndpointsResponse {
  bool success = 1;
}

message MsgRequestProviderLink {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgRequestProviderLink";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgRequestProviderLinkResponse {
  bool success = 1;
}

message MsgApproveProviderLink {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgApproveProviderLink";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string provider = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgApproveProviderLinkResponse {
  bool success = 1;
}

message MsgCancelProviderLink {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgCancelProviderLink";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgCancelProviderLinkResponse {
  bool success = 1;
}

message MsgUnpairProvider {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUnpairProvider";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string provider = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgUnpairProviderResponse {
  bool success = 1;
}

// MsgCreateDeal allows a user to create a new storage deal.
message MsgCreateDeal {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgCreateDeal";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // string cid = 2; // REMOVED: Capacity is decoupled from content.
  // uint64 size = 3; // REMOVED: Size is now defined by tier.
  uint64 duration_blocks = 4; // Duration of the deal in blocks
  string service_hint = 5; // "Hot" or "Cold"
  string max_monthly_spend = 6 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // User's monthly spend cap for elasticity
  string initial_escrow_amount = 7 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false]; // Initial $STOR amount
  // Field 8 reserved; static capacity tiers removed in favor of thin provisioning.
}

// MsgCreateDealResponse defines the response structure for creating a deal.
message MsgCreateDealResponse {
  uint64 deal_id = 1;
  repeated string assigned_providers = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgUpdateDealContent allows a user to commit or update the manifest of a deal.
message MsgUpdateDealContent {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUpdateDealContent";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
  string cid = 3; // New Root CID (Manifest)
  uint64 size = 4; // Actual size of the content in bytes
  uint64 total_mdus = 5; // Total committed MDUs (metadata + witness + user)
  uint64 witness_mdus = 6; // Witness MDUs committed after MDU #0
  string previous_manifest_root = 7; // Previous committed manifest root (empty on first commit)
}

message MsgUpdateDealContentResponse {
  bool success = 1;
}

// MsgBumpDealSetupSlot lets the deal owner replace one setup-phase Mode 2 slot.
message MsgBumpDealSetupSlot {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgBumpDealSetupSlot";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
  uint32 slot = 3;
  string expected_provider = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgBumpDealSetupSlotResponse {
  bool success = 1;
  string new_provider = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// EvmCreateDealIntent captures the fields that an EVM wallet signs over
// when creating a storage deal via the bridge path.
message EvmCreateDealIntent {
  string creator_evm = 1;       // 0x-prefixed EVM address
  // string cid = 2;            // REMOVED
  // uint64 size_bytes = 3;     // REMOVED
  uint64 duration_blocks = 4;   // Duration of the deal in blocks
  string service_hint = 5;      // Service hint (e.g. General:replicas=N)
  string initial_escrow = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ]; // Initial escrow amount (stake)
  string max_monthly_spend = 7 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ]; // Monthly spend cap (stake)
  uint64 nonce = 8;             // Per-EVM-address bridge nonce (strictly increasing)
  string chain_id = 9;          // polystorechaind chain-id (e.g. "test-1")
  reserved 10;
}

// EvmUpdateContentIntent captures fields for updating deal content via EVM.
message EvmUpdateContentIntent {
  string creator_evm = 1;
  uint64 deal_id = 2;
  string cid = 3;
  uint64 size_bytes = 4;
  uint64 nonce = 5;
  string chain_id = 6;
  uint64 total_mdus = 7;
  uint64 witness_mdus = 8;
  string previous_manifest_root = 9;
}

// MsgCreateDealFromEvm wraps a signed EVM intent and is executed on polystorechaind.
message MsgCreateDealFromEvm {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name) = "polystorechain/x/polystorechain/MsgCreateDealFromEvm";

  // sender is the Cosmos address paying gas (relayer or user).
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // intent is the structured deal payload signed by the EVM account.
  EvmCreateDealIntent intent = 2;
  // evm_signature is a 65-byte ECDSA signature (R||S||V) over the intent payload.
  bytes evm_signature = 3;
}

// MsgCreateDealFromEvmResponse returns the newly created deal ID.
message MsgCreateDealFromEvmResponse {
  uint64 deal_id = 1;
}

// MsgUpdateDealContentFromEvm wraps a signed EVM intent for content update.
message MsgUpdateDealContentFromEvm {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUpdateDealContentFromEvm";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  EvmUpdateContentIntent intent = 2;
  bytes evm_signature = 3;
}

message MsgUpdateDealContentFromEvmResponse {
  bool success = 1;
}

// MsgOpenRetrievalSession creates an on-chain retrieval session for a contiguous blob-range.
message MsgOpenRetrievalSession {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgOpenRetrievalSession";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // Deal owner
  uint64 deal_id = 2;
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes manifest_root = 4; // pinned 48-byte KZG commitment

  uint64 start_mdu_index = 5;
  uint32 start_blob_index = 6;
  uint64 blob_count = 7;

  uint64 nonce = 8;
  uint64 expires_at = 9; // block height (0 = no expiry)
}

message MsgOpenRetrievalSessionResponse {
  bytes session_id = 1; // 32-byte session id
}

// AllowlistProof is a keccak merkle inclusion proof.
// leaf := keccak256(creator_address_bytes20)
message AllowlistProof {
  uint32 leaf_index = 1;          // index of leaf in allowlist tree
  repeated bytes merkle_path = 2; // 32-byte sibling nodes
}

// VoucherAuth is a one-time voucher authorizing a sponsored session open.
// Signature scheme: EIP-712 over the typed fields (see types/eip712.go).
message VoucherAuth {
  uint64 deal_id = 1;
  bytes manifest_root = 2; // 48-byte KZG commitment pinned at session open
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // optional; empty means "any assigned provider"
  uint64 start_mdu_index = 4;
  uint32 start_blob_index = 5;
  uint64 blob_count = 6;
  uint64 expires_at = 7;
  uint64 nonce = 8;
  string redeemer = 9 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // optional; empty means "any"
  bytes signature = 10; // 65-byte ECDSA signature (R||S||V)
}

// MsgOpenRetrievalSessionSponsored creates a retrieval session funded by the requester.
message MsgOpenRetrievalSessionSponsored {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgOpenRetrievalSessionSponsored";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // requester/payer
  uint64 deal_id = 2;
  string provider = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes manifest_root = 4; // pinned 48-byte KZG commitment

  uint64 start_mdu_index = 5;
  uint32 start_blob_index = 6;
  uint64 blob_count = 7;

  uint64 nonce = 8;
  uint64 expires_at = 9; // block height (0 = default to deal end_block)

  // Optional slippage guard in bond denom units (0 = no max).
  string max_total_fee = 10 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];

  oneof auth {
    AllowlistProof allowlist_proof = 11;
    VoucherAuth voucher = 12;
  }
}

message MsgOpenRetrievalSessionSponsoredResponse {
  bytes session_id = 1; // 32-byte session id
}

message AuditTaskRef {
  uint64 epoch_id = 1;
  uint64 task_id = 2;
}

message RepairAuth {
  uint32 slot = 1;
}

// MsgOpenProtocolRetrievalSession creates a protocol-funded retrieval session.
message MsgOpenProtocolRetrievalSession {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgOpenProtocolRetrievalSession";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // protocol actor (assignee/pending provider)
  RetrievalSessionPurpose purpose = 2; // must be PROTOCOL_AUDIT or PROTOCOL_REPAIR
  uint64 deal_id = 3;
  string provider = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // serving provider (active slot provider)
  bytes manifest_root = 5; // pinned 48-byte KZG commitment

  uint64 start_mdu_index = 6;
  uint32 start_blob_index = 7;
  uint64 blob_count = 8;

  uint64 nonce = 9;
  uint64 expires_at = 10; // block height (0 = default to deal end_block)

  string max_total_fee = 11 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];

  oneof auth {
    AuditTaskRef audit_task = 12;
    RepairAuth repair = 13;
  }
}

message MsgOpenProtocolRetrievalSessionResponse {
  bytes session_id = 1; // 32-byte session id
}

// MsgUpdateDealRetrievalPolicy updates deal retrieval policy parameters.
message MsgUpdateDealRetrievalPolicy {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgUpdateDealRetrievalPolicy";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
  RetrievalPolicy policy = 3 [(gogoproto.nullable) = false];
}

message MsgUpdateDealRetrievalPolicyResponse {
  bool success = 1;
}

// MsgConfirmRetrievalSession marks a session as user-confirmed (proof-of-validation).
message MsgConfirmRetrievalSession {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgConfirmRetrievalSession";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes session_id = 2; // 32-byte session id
}

message MsgConfirmRetrievalSessionResponse {
  bool success = 1;
}

// MsgCancelRetrievalSession cancels an expired session and unlocks locked fees.
message MsgCancelRetrievalSession {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgCancelRetrievalSession";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes session_id = 2; // 32-byte session id
}

message MsgCancelRetrievalSessionResponse {
  bool success = 1;
}

// MsgSubmitRetrievalSessionProof submits proof-of-retrieval for a session (provider action).
message MsgSubmitRetrievalSessionProof {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgSubmitRetrievalSessionProof";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // provider address
  bytes session_id = 2; // 32-byte session id
  repeated ChainedProof proofs = 3 [(gogoproto.nullable) = false];
}

message MsgSubmitRetrievalSessionProofResponse {
  bool success = 1;
}

// MsgProveLiveness allows a Storage Provider to submit a proof of data liveness.
message MsgProveLiveness {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgProveLiveness";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
  uint64 epoch_id = 3;

  oneof proof_type {
    RetrievalReceipt user_receipt = 4; // Path A (Hot)
    ChainedProof system_proof = 5;     // Path B (Cold)
    RetrievalReceiptBatch user_receipt_batch = 6; // Path A (Hot, batched)
    RetrievalSessionProof session_proof = 7;      // Path A (Hot, session receipt)
  }
}

// MsgProveLivenessResponse defines the response structure for proving liveness.
message MsgProveLivenessResponse {
  bool success = 1;
  uint32 tier = 2; // e.g., Platinum, Gold, Silver, Fail (mapped to 0,1,2,3)
  string reward_amount = 3; // Actual reward amount
}

// MsgSignalSaturation allows a Storage Provider to signal high load for a deal.
message MsgSignalSaturation {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgSignalSaturation";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
}

// MsgSignalSaturationResponse defines the response structure for signaling saturation.
message MsgSignalSaturationResponse {
  bool success = 1;
  string message = 2;
  repeated string new_providers = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // Newly spawned hot replica providers
}

// MsgStartSlotRepair starts a make-before-break replacement for a Mode 2 slot.
message MsgStartSlotRepair {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgStartSlotRepair";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // deal owner
  uint64 deal_id = 2;
  uint32 slot = 3; // 0..N-1
  string pending_provider = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgStartSlotRepairResponse {
  bool success = 1;
}

// MsgCompleteSlotRepair promotes the pending provider to the active slot provider.
message MsgCompleteSlotRepair {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgCompleteSlotRepair";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // deal owner
  uint64 deal_id = 2;
  uint32 slot = 3; // 0..N-1
}

message MsgCompleteSlotRepairResponse {
  bool success = 1;
}

// MsgAddCredit allows a user to top up the escrow balance for a deal.
message MsgAddCredit {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgAddCredit";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 deal_id = 2;
  string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
}

// MsgAddCreditResponse defines the response structure for adding credit.
message MsgAddCreditResponse {
  string new_balance = 1 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
}

// MsgExtendDeal extends the deal term by a number of blocks, charging spot storage price
// for the deal's currently committed bytes.
message MsgExtendDeal {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgExtendDeal";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // deal owner
  uint64 deal_id = 2;
  uint64 additional_duration_blocks = 3;
}

message MsgExtendDealResponse {
  bool success = 1;
  uint64 new_end_block = 2;
}

// MsgWithdrawRewards allows a Storage Provider to withdraw accumulated rewards.
message MsgWithdrawRewards {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "polystorechain/x/polystorechain/MsgWithdrawRewards";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgWithdrawRewardsResponse defines the response structure for withdrawing rewards.
message MsgWithdrawRewardsResponse {
  string amount_withdrawn = 1 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
}
