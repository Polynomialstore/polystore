{
  "name": "repair-candidate-exhaustion-controls",
  "description": "Sensitivity sweep for replacement capacity, retry caps, and cooldowns when repair candidates are exhausted or saturated.",
  "base_scenario": "../scenarios/repair_candidate_exhaustion.yaml",
  "cases": [
    {
      "name": "baseline-cap8-attempt1-backoff2"
    },
    {
      "name": "extra-capacity-cap10",
      "config": {
        "provider_capacity_min": 10,
        "provider_capacity_max": 10
      },
      "assertions": {
        "min_repair_attempts": 8,
        "min_repairs_started": 8,
        "min_repairs_ready": 8,
        "min_repairs_completed": 8,
        "min_repair_backoffs": 0,
        "max_repair_backoffs": 0,
        "min_repair_cooldowns": 0,
        "max_repair_cooldowns": 0,
        "min_repair_attempt_caps": 0,
        "max_repair_attempt_caps": 0
      }
    },
    {
      "name": "unsafe-low-capacity-cap6",
      "config": {
        "provider_capacity_min": 6,
        "provider_capacity_max": 6
      },
      "assertions": {
        "min_repair_attempts": 8,
        "min_repair_backoffs": 40,
        "min_repair_cooldowns": 16,
        "min_repair_attempt_caps": 16,
        "min_providers_over_capacity": 1,
        "max_providers_over_capacity": 12
      }
    },
    {
      "name": "attempt-cap2",
      "config": {
        "repair_attempt_cap_per_slot": 2
      },
      "assertions": {
        "min_repair_attempts": 16,
        "max_repair_attempts": 16,
        "min_repair_backoffs": 40,
        "min_repair_cooldowns": 16,
        "min_repair_attempt_caps": 8,
        "max_providers_over_capacity": 0
      }
    },
    {
      "name": "no-attempt-cap",
      "config": {
        "repair_attempt_cap_per_slot": 0
      },
      "assertions": {
        "min_repair_attempts": 24,
        "min_repair_backoffs": 40,
        "min_repair_cooldowns": 16,
        "min_repair_attempt_caps": 0,
        "max_repair_attempt_caps": 0,
        "max_providers_over_capacity": 0
      }
    },
    {
      "name": "no-backoff",
      "config": {
        "repair_backoff_epochs": 0
      },
      "assertions": {
        "min_repair_attempts": 8,
        "min_repair_backoffs": 40,
        "min_repair_cooldowns": 0,
        "max_repair_cooldowns": 0,
        "min_repair_attempt_caps": 30,
        "max_providers_over_capacity": 0
      }
    },
    {
      "name": "backoff4",
      "config": {
        "repair_backoff_epochs": 4
      },
      "assertions": {
        "min_repair_attempts": 8,
        "min_repair_backoffs": 40,
        "min_repair_cooldowns": 20,
        "min_repair_attempt_caps": 8,
        "max_providers_over_capacity": 0
      }
    }
  ]
}
