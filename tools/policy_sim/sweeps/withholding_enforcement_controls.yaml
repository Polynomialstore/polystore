{
  "name": "withholding-enforcement-controls",
  "description": "Sensitivity sweep for refusal-to-serve soft failures across measure-only, repair-only, reward exclusion, delayed thresholds, multi-provider withholding, and repair throughput limits.",
  "base_scenario": "../scenarios/withholding.yaml",
  "cases": [
    {
      "name": "baseline-reward-exclusion"
    },
    {
      "name": "repair-only-reward-leak",
      "config": {
        "enforcement_mode": "REPAIR_ONLY"
      },
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_delinquent_slots": 1,
        "min_reward_coverage": 1.0,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "measure-only-detects-but-does-not-repair",
      "config": {
        "enforcement_mode": "MEASURE_ONLY"
      },
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 1,
        "min_repairs_started": 0,
        "max_repairs_started": 0,
        "min_repairs_ready": 0,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "delayed-soft-eviction",
      "config": {
        "evict_after_missed_epochs": 4,
        "deputy_evict_after_missed_epochs": 3
      },
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_suspect_slots": 1,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "aggressive-soft-eviction",
      "config": {
        "evict_after_missed_epochs": 1,
        "deputy_evict_after_missed_epochs": 1
      },
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "multi-provider-withholding",
      "faults": [
        "withhold:sp-001:1.0",
        "lazy:sp-001",
        "withhold:sp-002:1.0",
        "lazy:sp-002",
        "withhold:sp-003:1.0",
        "lazy:sp-003"
      ],
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 3,
        "min_repairs_started": 3,
        "min_repairs_ready": 3,
        "min_delinquent_slots": 3,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "repair-throughput-limited-withholding",
      "config": {
        "max_repairs_started_per_epoch": 1,
        "repair_epochs": 2,
        "repair_backoff_epochs": 1
      },
      "faults": [
        "withhold:sp-001:1.0",
        "lazy:sp-001",
        "withhold:sp-002:1.0",
        "lazy:sp-002",
        "withhold:sp-003:1.0",
        "lazy:sp-003"
      ],
      "assertions": {
        "min_success_rate": 0.95,
        "min_withheld_responses": 3,
        "min_repairs_started": 1,
        "min_repair_backoffs": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    }
  ]
}
