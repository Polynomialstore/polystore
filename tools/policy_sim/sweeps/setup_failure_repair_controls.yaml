{
  "name": "setup-failure-repair-controls",
  "description": "Sensitivity sweep for setup-phase provider failures across observation mode, repair-only mode, threshold timing, multi-provider setup failure, and repair-start throttles.",
  "base_scenario": "../scenarios/setup_failure.yaml",
  "cases": [
    {
      "name": "baseline-reward-exclusion"
    },
    {
      "name": "repair-only-setup-repair",
      "config": {
        "enforcement_mode": "REPAIR_ONLY"
      },
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "measure-only-detects-but-does-not-repair",
      "config": {
        "enforcement_mode": "MEASURE_ONLY"
      },
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 1,
        "min_repairs_started": 0,
        "max_repairs_started": 0,
        "min_repairs_ready": 0,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "aggressive-setup-threshold",
      "config": {
        "evict_after_missed_epochs": 1,
        "deputy_evict_after_missed_epochs": 1
      },
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "delayed-setup-threshold",
      "config": {
        "evict_after_missed_epochs": 4,
        "deputy_evict_after_missed_epochs": 3
      },
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 1,
        "min_repairs_started": 1,
        "min_repairs_ready": 1,
        "min_suspect_slots": 1,
        "min_delinquent_slots": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "multi-provider-setup-failure",
      "faults": [
        "offline:sp-001:1-3",
        "offline:sp-002:1-3",
        "offline:sp-003:1-3"
      ],
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 3,
        "min_repairs_started": 3,
        "min_repairs_ready": 3,
        "min_delinquent_slots": 3,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    },
    {
      "name": "repair-throughput-limited-setup-failure",
      "config": {
        "max_repairs_started_per_epoch": 1,
        "repair_epochs": 2,
        "repair_backoff_epochs": 1
      },
      "faults": [
        "offline:sp-001:1-3",
        "offline:sp-002:1-3",
        "offline:sp-003:1-3"
      ],
      "assertions": {
        "min_success_rate": 0.99,
        "min_offline_responses": 3,
        "min_repairs_started": 1,
        "min_repair_backoffs": 1,
        "max_provider_slashed": 0.0,
        "max_data_loss_events": 0,
        "max_paid_corrupt_bytes": 0
      }
    }
  ]
}
