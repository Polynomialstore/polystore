{
  "name": "provider-churn-caps",
  "description": "Sensitivity sweep for provider economic churn caps versus repair throughput under the economic churn fixture.",
  "base_scenario": "../scenarios/provider_economic_churn.yaml",
  "cases": [
    {
      "name": "slow-churn-constrained-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 1,
        "max_repairs_started_per_epoch": 4
      },
      "assertions": {
        "min_success_rate": 0.94,
        "max_unavailable_reads": 100,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "slow-churn-base-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 1,
        "max_repairs_started_per_epoch": 16
      },
      "assertions": {
        "min_success_rate": 0.99,
        "max_unavailable_reads": 10,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "baseline-churn-base-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 2,
        "max_repairs_started_per_epoch": 16
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "fast-churn-constrained-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 4,
        "max_repairs_started_per_epoch": 8
      },
      "assertions": {
        "min_success_rate": 0.95,
        "max_unavailable_reads": 40,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "fast-churn-wide-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 4,
        "max_repairs_started_per_epoch": 32
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "burst-churn-constrained-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 8,
        "max_repairs_started_per_epoch": 16
      },
      "assertions": {
        "min_success_rate": 0.95,
        "max_unavailable_reads": 40,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    },
    {
      "name": "burst-churn-wide-repair",
      "config": {
        "provider_churn_max_providers_per_epoch": 8,
        "max_repairs_started_per_epoch": 32
      },
      "assertions": {
        "min_success_rate": 0.95,
        "max_unavailable_reads": 40,
        "max_data_loss_events": 0,
        "min_churn_pressure_provider_epochs": 8
      }
    }
  ]
}
