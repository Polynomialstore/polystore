{
  "name": "closed-retrieval-rejection-controls",
  "description": "Sensitivity sweep for post-close retrieval rejection timing, partial close behavior, refund accounting, and larger closed-content read demand.",
  "base_scenario": "../scenarios/closed_retrieval_rejection.yaml",
  "cases": [
    {
      "name": "baseline-close-all-epoch4"
    },
    {
      "name": "early-close-all-epoch2",
      "config": {
        "deal_close_epoch": 2
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "min_closed_retrieval_attempts": 300,
        "max_owner_retrieval_escrow_debited": 0.0,
        "max_data_loss_events": 0,
        "min_storage_escrow_refunded": 450.0,
        "max_storage_escrow_outstanding": 0.0,
        "exact_final_open_deals": 0,
        "exact_final_closed_deals": 12,
        "exact_deals_closed": 12
      }
    },
    {
      "name": "partial-half-close-epoch4",
      "config": {
        "deal_duration_epochs": 8,
        "deal_close_count": 0,
        "deal_close_bps": 5000
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "min_closed_retrieval_attempts": 40,
        "max_owner_retrieval_escrow_debited": 0.0,
        "max_data_loss_events": 0,
        "min_storage_escrow_refunded": 100.0,
        "min_storage_escrow_outstanding": 100.0,
        "max_storage_escrow_outstanding": 130.0,
        "exact_final_open_deals": 6,
        "exact_final_closed_deals": 6,
        "exact_deals_closed": 6
      }
    },
    {
      "name": "no-close-open-control",
      "config": {
        "deal_close_epoch": 0,
        "deal_close_count": 0,
        "deal_close_bps": 0
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "min_closed_retrieval_attempts": 0,
        "max_closed_retrieval_attempts": 0,
        "max_owner_retrieval_escrow_debited": 0.0,
        "max_data_loss_events": 0,
        "min_storage_escrow_refunded": 0.0,
        "max_storage_escrow_refunded": 0.0,
        "max_storage_escrow_outstanding": 0.0,
        "exact_final_open_deals": 12,
        "exact_final_closed_deals": 0,
        "exact_deals_closed": 0
      }
    },
    {
      "name": "larger-closed-read-demand",
      "config": {
        "providers": 120,
        "users": 500,
        "deals": 40,
        "deal_close_count": 40
      },
      "assertions": {
        "min_success_rate": 1.0,
        "max_unavailable_reads": 0,
        "min_closed_retrieval_attempts": 900,
        "max_owner_retrieval_escrow_debited": 0.0,
        "max_data_loss_events": 0,
        "min_storage_escrow_refunded": 700.0,
        "max_storage_escrow_outstanding": 0.0,
        "exact_final_open_deals": 0,
        "exact_final_closed_deals": 40,
        "exact_deals_closed": 40
      }
    }
  ]
}
