{
  "name": "storage-demand-elasticity-controls",
  "description": "Sensitivity sweep for storage-price demand elasticity, price-step speed, reference price, and disabled-controller recovery.",
  "base_scenario": "../scenarios/demand_elasticity_recovery.yaml",
  "cases": [
    {
      "name": "baseline-elastic-recovery"
    },
    {
      "name": "slow-250bps-price-step",
      "config": {
        "dynamic_pricing_max_step_bps": 250
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deals_suppressed_price": 1,
        "min_new_deal_requests": 1,
        "min_new_deals_accepted": 1,
        "min_new_deal_latent_acceptance_rate": 0.01,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.7,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "fast-2000bps-price-step",
      "config": {
        "dynamic_pricing_max_step_bps": 2000
      }
    },
    {
      "name": "low-elasticity-muted-suppression",
      "config": {
        "storage_demand_elasticity_bps": 2500
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deal_requests": 1,
        "min_new_deals_accepted": 1,
        "min_new_deal_latent_acceptance_rate": 0.5,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.0,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "high-elasticity-hard-suppression",
      "config": {
        "storage_demand_elasticity_bps": 20000
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deals_suppressed_price": 50,
        "min_new_deal_requests": 1,
        "min_new_deals_accepted": 1,
        "min_new_deal_latent_acceptance_rate": 0.01,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.0,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "minimum-demand-floor",
      "config": {
        "storage_demand_min_bps": 2500
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deal_requests": 50,
        "min_new_deals_accepted": 50,
        "min_new_deal_latent_acceptance_rate": 0.25,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.0,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "higher-reference-price",
      "config": {
        "storage_demand_reference_price": 1.5
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deal_requests": 1,
        "min_new_deals_accepted": 1,
        "min_new_deal_latent_acceptance_rate": 0.3,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.0,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "controller-disabled-unsafe",
      "config": {
        "dynamic_pricing": false
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deals_suppressed_price": 200,
        "min_new_deal_requests": 0,
        "min_new_deals_accepted": 0,
        "min_new_deal_latent_acceptance_rate": 0.0,
        "max_new_deals_accepted": 0,
        "max_new_deal_latent_acceptance_rate": 0.0,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 2.0,
        "max_data_loss_events": 0
      }
    },
    {
      "name": "elasticity-disabled-unsafe",
      "config": {
        "storage_demand_elasticity_bps": 0
      },
      "assertions": {
        "min_success_rate": 1.0,
        "min_new_deal_latent_requests": 200,
        "min_new_deals_suppressed_price": 0,
        "max_new_deals_suppressed_price": 0,
        "min_new_deals_accepted": 200,
        "min_new_deal_latent_acceptance_rate": 1.0,
        "max_new_deals_rejected_price": 0,
        "max_new_deals_rejected_capacity": 0,
        "max_final_storage_price": 1.0,
        "max_data_loss_events": 0
      }
    }
  ]
}
