name: Tauri Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build Tauri App (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nil_gateway_gui/package-lock.json

      - name: Install Dependencies
        working-directory: nil_gateway_gui
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: nil_gateway_gui
          tagName: ${{ github.ref_name }}
          releaseName: NilGateway GUI ${{ github.ref_name }}
          releaseBody: "Automated release build."
          releaseDraft: false
          prerelease: false
