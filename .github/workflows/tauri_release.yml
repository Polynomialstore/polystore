name: Tauri Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build Tauri App (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            label: macos-intel
            bundles: dmg
          - platform: macos-15
            label: macos-apple-silicon
            bundles: dmg
          - platform: ubuntu-22.04
            label: linux-ubuntu-22.04
            bundles: deb,rpm
          - platform: windows-2022
            label: windows-2022
            bundles: nsis,msi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nil_gateway_gui/package-lock.json

      - name: Install Dependencies
        working-directory: nil_gateway_gui
        run: npm ci

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows GNU target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: nil_gateway_gui
          tagName: ${{ github.ref_name }}
          releaseName: NilGateway GUI ${{ github.ref_name }}
          releaseBody: "Automated release build."
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
