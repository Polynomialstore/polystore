name: PolyStore CI

on:
  push

jobs:
  # ------------------------------------------------------------------
  # GO SERVICES (PolyStore Chain, Faucet, S3, Relayer)
  # ------------------------------------------------------------------
  go-test:
    name: Go Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [polystorechain, polystore_faucet, polystore_gateway, polystore_relayer]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x' # Match `go.mod` (polystorechain/polystore_gateway/etc.)
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Set up Rust
        if: matrix.service == 'polystore_gateway' || matrix.service == 'polystorechain'
        uses: dtolnay/rust-toolchain@stable

      - name: Build polystore_core
        if: matrix.service == 'polystore_gateway' || matrix.service == 'polystorechain'
        run: |
          cd polystore_core
          cargo build --release

      - name: Test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "polystorechain" ]; then
            echo "Reconstructing vendor for polystorechain..."
            go mod vendor
            git checkout vendor
          fi
          
          # Add polystore_core release dir to LD_LIBRARY_PATH for polystore_gateway/polystorechain
          # We use GITHUB_WORKSPACE because working-directory is set to the service dir
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          
          go test ./... -v

  # ------------------------------------------------------------------
  # RUST CRATES (Core, CLI, P2P, Mock L1)
  # ------------------------------------------------------------------
  rust-test:
    name: Rust Test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [polystore_core, polystore_cli, polystore_p2p, polystore_mock_l1]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.crate }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.crate }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.crate)) }}

      - name: Test ${{ matrix.crate }}
        working-directory: ${{ matrix.crate }}
        run: cargo test --verbose

  # ------------------------------------------------------------------
  # FRONTEND (PolyStore Website)
  # ------------------------------------------------------------------
  frontend-build:
    name: Website Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci

      - name: Type Check & Build
        working-directory: polystore-website
        run: npm run build

      - name: Run Unit Tests
        working-directory: polystore-website
        run: npm run test:unit

      - name: Lint
        working-directory: polystore-website
        run: npm run lint

  policy-simulator:
    name: Policy Simulator Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run policy simulator unit tests
        run: python3 -m unittest discover -s tools/policy_sim

      - name: Verify policy sweep coverage
        run: python3 tools/policy_sim/check_sweep_coverage.py

      - name: Run full policy fixture suite and regenerate reports
        run: |
          python3 tools/policy_sim/generate_report_corpus.py \
            --scenario-dir tools/policy_sim/scenarios \
            --out-dir docs/simulation-reports/policy-sim \
            --work-dir _artifacts/policy_sim/runs \
            --jobs 0
          python3 tools/policy_sim/run_sweeps.py \
            --sweep-dir tools/policy_sim/sweeps \
            --run-dir _artifacts/policy_sim/sweeps \
            --out-dir docs/simulation-reports/policy-sim/sweeps \
            --jobs 0

      - name: Verify committed policy reports are current
        run: git diff --exit-code docs/simulation-reports/policy-sim

      - name: Upload policy simulator artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: policy-simulator-artifacts
          path: |
            _artifacts/policy_sim/runs/**
            _artifacts/policy_sim/sweeps/**
            docs/simulation-reports/policy-sim/**
          if-no-files-found: ignore

  e2e-sparse-browser:
    name: Browser Sparse Upload Proof
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-build]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci --prefer-offline --no-audit
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('polystore-website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: polystore-website
        run: npx playwright install --with-deps chromium

      - name: Run browser-only sparse upload proof
        run: scripts/e2e_sparse_browser_upload.sh

      - name: Upload sparse browser proof artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-sparse-browser-artifacts
          path: |
            polystore-website/test-results/**
            polystore-website/playwright-report/**
          if-no-files-found: ignore

  website-node-integration:
    name: Website Node Integration
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, frontend-build, e2e-sparse-browser]
    env:
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (polystore_core/polystore_cli)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polystore_core/target
            polystore_cli/target
          key: ${{ runner.os }}-cargo-website-node-integration-${{ hashFiles('polystore_core/Cargo.lock', 'polystore_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci --prefer-offline --no-audit

      - name: Build polystore_core (native)
        run: cd polystore_core && cargo build --release

      - name: Run Website Node integration suite
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          scripts/e2e_node_integration.sh

      - name: Upload website Node integration artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: website-node-integration-artifacts
          path: |
            _artifacts/localnet/**
            _artifacts/devnet_alpha_multi_sp/**
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # TAURI GUI (PolyStore Gateway GUI)
  # ------------------------------------------------------------------
  tauri-gui:
    name: Tauri GUI Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore_gateway_gui/package-lock.json

      - name: Install Dependencies
        working-directory: polystore_gateway_gui
        run: npm ci

      - name: Type Check
        working-directory: polystore_gateway_gui
        run: npm run lint

      - name: Run Unit Tests
        working-directory: polystore_gateway_gui
        run: npm test

      - name: Build UI
        working-directory: polystore_gateway_gui
        run: npm run build

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo Format
        working-directory: polystore_gateway_gui/src-tauri
        run: cargo fmt --check

      - name: Cargo Test
        working-directory: polystore_gateway_gui/src-tauri
        run: cargo test --verbose

      - name: Cargo Clippy
        working-directory: polystore_gateway_gui/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  native-wasm-parity:
    name: Native/WASM Parity
    runs-on: ubuntu-latest
    needs: [rust-test, frontend-build]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci

      - name: Build WASM for website
        run: cd polystore_core && wasm-pack build --release --target web --out-dir ../polystore-website/public/wasm --out-name polystore_core

      - name: Run Native/WASM Parity
        run: polystore-website/node_modules/.bin/tsx tools/parity/compare_parity.ts

  e2e-smoke-test:
    name: E2E Smoke (${{ matrix.smoke_name }})
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, frontend-build] # Ensure components are tested individually first
    env:
      GOFLAGS: -mod=mod
    strategy:
      fail-fast: false
      matrix:
        include:
          - smoke_name: lifecycle-gateway
            smoke_script: scripts/e2e_lifecycle.sh
          - smoke_name: lifecycle-no-gateway
            smoke_script: scripts/e2e_lifecycle_no_gateway.sh
          - smoke_name: retrieval-fees
            smoke_script: ./e2e_retrieval_fees.sh
          - smoke_name: retrieval-session-cli
            smoke_script: ./e2e_open_retrieval_session_cli.sh
          - smoke_name: retrieval-session-mode2
            smoke_script: ./e2e_open_retrieval_session_mode2_cli.sh
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive # For polystore_bridge, etc.

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown # Required for wasm-pack build

      - name: Cache Cargo (polystore_core/polystore_cli)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polystore_core/target
            polystore_cli/target
          key: ${{ runner.os }}-cargo-e2e-smoke-${{ hashFiles('polystore_core/Cargo.lock', 'polystore_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install eth-account bech32

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM for website
        run: cd polystore_core && wasm-pack build --release --target web --out-dir ../polystore-website/public/wasm --out-name polystore_core

      - name: Build polystore_core (native)
        run: cd polystore_core && cargo build --release

      - name: Run smoke script (${{ matrix.smoke_name }})
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          ${{ matrix.smoke_script }}

  e2e-browser-no-gateway:
    name: Playwright (Gateway Absent)
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, frontend-build]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (polystore_core/polystore_cli)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polystore_core/target
            polystore_cli/target
          key: ${{ runner.os }}-cargo-e2e-gateway-absent-${{ hashFiles('polystore_core/Cargo.lock', 'polystore_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci --prefer-offline --no-audit
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('polystore-website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: polystore-website
        run: npx playwright install --with-deps chromium

      - name: Build polystore_core (native)
        run: cd polystore_core && cargo build --release

      - name: Run Playwright (Gateway Absent)
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          scripts/e2e_browser_smoke_no_gateway.sh

      - name: Upload Gateway-absent E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-gateway-absent-artifacts
          path: |
            _artifacts/devnet_alpha_multi_sp/**
            polystore-website/test-results/**
            polystore-website/playwright-report/**
          if-no-files-found: ignore

  e2e-mode2-fast:
    name: E2E Mode2 Stripe (Fast 3 SPs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go-test, rust-test, frontend-build]
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (polystore_core/polystore_cli)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polystore_core/target
            polystore_cli/target
          key: ${{ runner.os }}-cargo-e2e-mode2-${{ hashFiles('polystore_core/Cargo.lock', 'polystore_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci --prefer-offline --no-audit
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('polystore-website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: polystore-website
        run: npx playwright install --with-deps chromium

      - name: Run Mode2 Stripe E2E (fast)
        env:
          E2E_MODE2_FAST: '1'
          PLAYWRIGHT_SKIP_INSTALL: '1'
          PROVIDER_COUNT: '3'
          E2E_MODE2_GREP: 'mode2 deal'
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          scripts/e2e_mode2_stripe_multi_sp.sh

      - name: Upload Mode2 E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-mode2-fast-artifacts
          path: |
            _artifacts/devnet_alpha_multi_sp/**
            polystore-website/test-results/**
            polystore-website/playwright-report/**
          if-no-files-found: ignore

  e2e-gateway-retrieval-multi-sp:
    name: E2E Gateway Retrieval (Multi-SP)
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, frontend-build]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (polystore_core/polystore_cli)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polystore_core/target
            polystore_cli/target
          key: ${{ runner.os }}-cargo-e2e-retrieval-multi-sp-${{ hashFiles('polystore_core/Cargo.lock', 'polystore_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci --prefer-offline --no-audit

      - name: Build polystore_core (native)
        run: cd polystore_core && cargo build --release

      - name: Run Gateway Retrieval Multi-SP E2E
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/polystore_core/target/release
          scripts/ci_e2e_gateway_retrieval_multi_sp.sh

      - name: Upload retrieval E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-retrieval-multi-sp-artifacts
          path: |
            _artifacts/devnet_alpha_multi_sp/**
            polystore-website/test-results/**
            polystore-website/playwright-report/**
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # SMART CONTRACTS (Foundry)
  # ------------------------------------------------------------------
  foundry-test:
    name: Solidity Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Tests
        working-directory: polystore_bridge
        run: forge test -vv
