name: NilStore E2E Heavy

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      run_mode2_heavy:
        description: 'Run Mode2 heavy suite (12 SPs)'
        required: true
        default: true
        type: boolean
      run_libp2p_relay:
        description: 'Run legacy LibP2P relay suite'
        required: true
        default: false
        type: boolean

jobs:
  e2e-mode2-heavy:
    name: E2E Mode2 Stripe (Heavy 12 SPs)
    if: ${{ github.event_name == 'schedule' || inputs.run_mode2_heavy }}
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (nil_core/nil_cli)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nil_core/target
            nil_cli/target
          key: ${{ runner.os }}-cargo-e2e-mode2-heavy-${{ hashFiles('nil_core/Cargo.lock', 'nil_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nil-website/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: nil-website
        run: npm ci --prefer-offline --no-audit
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('nil-website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: nil-website
        run: npx playwright install --with-deps chromium

      - name: Run Mode2 Stripe E2E (heavy)
        env:
          PLAYWRIGHT_SKIP_INSTALL: '1'
          PROVIDER_COUNT: '12'
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/nil_core/target/release
          scripts/e2e_mode2_stripe_multi_sp.sh

      - name: Upload Mode2 heavy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mode2-heavy-artifacts
          path: |
            _artifacts/devnet_alpha_multi_sp/**
            nil-website/test-results/**
            nil-website/playwright-report/**
          if-no-files-found: ignore

  e2e-libp2p-relay:
    name: Playwright (LibP2P Relay)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_libp2p_relay }}
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (nil_core/nil_cli)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nil_core/target
            nil_cli/target
          key: ${{ runner.os }}-cargo-e2e-libp2p-relay-${{ hashFiles('nil_core/Cargo.lock', 'nil_cli/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nil-website/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Dependencies
        working-directory: nil-website
        run: npm ci --prefer-offline --no-audit
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('nil-website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: nil-website
        run: npx playwright install --with-deps chromium

      - name: Build nil_core (native)
        run: cd nil_core && cargo build --release

      - name: Run Playwright (LibP2P Relay)
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/nil_core/target/release
          scripts/e2e_browser_libp2p_relay.sh

      - name: Upload LibP2P relay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-libp2p-relay-artifacts
          path: |
            _artifacts/devnet_alpha_multi_sp/**
            nil-website/test-results/**
            nil-website/playwright-report/**
          if-no-files-found: ignore
