name: E2E Playwright Tests

on:
  push

jobs:
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM for website
        run: cd polystore_core && wasm-pack build --release --target web --out-dir ../polystore-website/public/wasm --out-name polystore_core

      - name: Build polystore_cli (native)
        run: cd polystore_cli && cargo build --release

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: polystore-website/package-lock.json

      - name: Install Dependencies
        working-directory: polystore-website
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: polystore-website
        run: npx playwright install --with-deps chromium

      - name: Start Dev Server
        working-directory: polystore-website
        run: |
          npx vite --host 0.0.0.0 --port 5173 &
          npx wait-on http://localhost:5173 --timeout 60000
        env:
          VITE_ENABLE_FAUCET: "1"

      - name: Run Playwright Tests
        working-directory: polystore-website
        run: npx playwright test tests/smoke.spec.ts
        env:
          # WEB_SERVER_COMMAND is NOT set, so playwright will NOT start the server again
          VITE_E2E: "1"
